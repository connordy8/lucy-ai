name: Lucy — Class Reminders

on:
  # No cron schedule — triggered reliably by cron-job.org via
  # /api/reminder_check (which checks calendar first, only dispatches
  # this workflow when a class is actually in the reminder window).
  workflow_dispatch:

concurrency:
  group: class-reminder
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests google-auth google-api-python-client

      - name: Check for upcoming classes
        env:
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          BETH_PHONE_NUMBER: ${{ secrets.BETH_PHONE_NUMBER }}
          BETH_CELL_NUMBER: ${{ secrets.BETH_CELL_NUMBER }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          CONNOR_PHONE_NUMBER: ${{ secrets.CONNOR_PHONE_NUMBER }}
        run: python phone_reminder.py
