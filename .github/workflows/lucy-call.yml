name: Lucy — Call Beth

on:
  # Evening call only — triggered by Vercel Cron at exactly 11:30 PM PT
  # No schedule here; Vercel cron hits /api/cron_trigger which dispatches this workflow

  # Allow manual trigger with call type selection
  workflow_dispatch:
    inputs:
      command:
        description: "Command to run"
        required: true
        default: "call"
        type: choice
        options:
          - call
          - call-evening
          - test
          - post-process
          - update

permissions:
  contents: write

jobs:
  lucy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests google-auth google-api-python-client

      - name: Determine call type
        id: calltype
        run: |
          if [ -n "${{ github.event.inputs.command }}" ]; then
            echo "cmd=${{ github.event.inputs.command }}" >> $GITHUB_OUTPUT
          else
            # Check current hour in PT to decide morning vs evening
            HOUR=$(TZ=America/Los_Angeles date +%H)
            if [ "$HOUR" -ge 20 ] || [ "$HOUR" -lt 6 ]; then
              echo "cmd=call-evening" >> $GITHUB_OUTPUT
            else
              echo "cmd=call" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Lucy
        env:
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          BETH_PHONE_NUMBER: ${{ secrets.BETH_PHONE_NUMBER }}
          BETH_CELL_NUMBER: ${{ secrets.BETH_CELL_NUMBER }}
        working-directory: lucy
        run: python lucy_call.py ${{ steps.calltype.outputs.cmd }}

      - name: Post-process (save memories)
        if: always()
        env:
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        working-directory: lucy
        run: |
          sleep 10
          python lucy_call.py post-process

      - name: Commit new memories
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lucy/memory/
          if git diff --cached --quiet; then
            echo "No new memories"
          else
            git commit -m "Lucy memory update [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
